<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DAT Mailer — Sign In</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --border: #1e1e2e;
    --text: #e2e2f0;
    --muted: #6b6b8a;
    --accent: #6366f1;
    --accent-hover: #4f52d6;
    --green: #22c55e;
    --red: #ef4444;
    --radius: 12px;
  }
  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .bg-grid {
    position: fixed; inset: 0; z-index: 0;
    background-image: linear-gradient(var(--border) 1px, transparent 1px),
                      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 40px 40px;
    opacity: 0.3;
  }
  .card {
    position: relative; z-index: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 40px;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 24px 64px rgba(0,0,0,0.5);
  }
  .logo {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 32px;
  }
  .logo-icon {
    width: 40px; height: 40px;
    background: linear-gradient(135deg, #6366f1, #22c55e);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }
  .logo-text { font-size: 20px; font-weight: 700; }
  .logo-sub { font-size: 12px; color: var(--muted); margin-top: 1px; }
  h1 { font-size: 22px; font-weight: 600; margin-bottom: 6px; }
  .subtitle { color: var(--muted); font-size: 14px; margin-bottom: 28px; }
  .field { margin-bottom: 16px; }
  label { display: block; font-size: 13px; font-weight: 500; color: var(--muted); margin-bottom: 6px; }
  input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: inherit;
    font-size: 14px;
    padding: 10px 14px;
    outline: none;
    transition: border-color .15s;
  }
  input:focus { border-color: var(--accent); }
  .btn {
    width: 100%; padding: 11px;
    background: linear-gradient(135deg, var(--accent), #22c55e);
    border: none; border-radius: 8px;
    color: #fff; font-family: inherit;
    font-size: 14px; font-weight: 600;
    cursor: pointer; margin-top: 8px;
    transition: opacity .15s, transform .1s;
  }
  .btn:hover { opacity: 0.9; }
  .btn:active { transform: scale(0.99); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .error {
    background: rgba(239,68,68,0.1);
    border: 1px solid rgba(239,68,68,0.3);
    border-radius: 8px;
    color: #fca5a5;
    font-size: 13px;
    padding: 10px 14px;
    margin-bottom: 16px;
    display: none;
  }
  .error.show { display: block; }
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="card">
  <div class="logo">
    <div class="logo-icon">✉</div>
    <div>
      <div class="logo-text">DAT Mailer</div>
      <div class="logo-sub">Freight Outreach Automation</div>
    </div>
  </div>
  <h1>Welcome back</h1>
  <p class="subtitle">Sign in to your account to continue</p>

  {% if error %}
  <div class="error show">{{ error }}</div>
  {% endif %}

  <div class="error" id="err"></div>

  <div class="field">
    <label>Email</label>
    <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
  </div>
  <div class="field">
    <label>Password</label>
    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
  </div>
  <button class="btn" id="loginBtn" onclick="doLogin()">Sign In</button>
</div>

<script>
  document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

  async function doLogin() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const err = document.getElementById('err');
    const btn = document.getElementById('loginBtn');
    if (!email || !password) { showErr('Please fill in all fields'); return; }
    btn.disabled = true; btn.textContent = 'Signing in…';
    try {
      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();
      if (res.ok) { window.location.href = '/'; }
      else { showErr(data.error || 'Login failed'); btn.disabled = false; btn.textContent = 'Sign In'; }
    } catch(e) { showErr('Network error'); btn.disabled = false; btn.textContent = 'Sign In'; }
  }

  function showErr(msg) {
    const err = document.getElementById('err');
    err.textContent = msg; err.classList.add('show');
  }
</script>
</body>
</html>
