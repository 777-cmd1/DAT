<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DAT Mailer — Create Account</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0f; --surface: #111118; --border: #1e1e2e;
    --text: #e2e2f0; --muted: #6b6b8a;
    --accent: #6366f1; --green: #22c55e;
  }
  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh; display: flex;
    align-items: center; justify-content: center; padding: 24px;
  }
  .bg-grid {
    position: fixed; inset: 0; z-index: 0;
    background-image: linear-gradient(var(--border) 1px, transparent 1px),
                      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 40px 40px; opacity: 0.3;
  }
  .card {
    position: relative; z-index: 1;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 20px; padding: 40px; width: 100%; max-width: 420px;
    box-shadow: 0 24px 64px rgba(0,0,0,0.5);
  }
  .logo { display: flex; align-items: center; gap: 10px; margin-bottom: 32px; }
  .logo-icon {
    width: 40px; height: 40px;
    background: linear-gradient(135deg, #6366f1, #22c55e);
    border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px;
  }
  .logo-text { font-size: 20px; font-weight: 700; }
  .logo-sub { font-size: 12px; color: var(--muted); margin-top: 1px; }
  .invite-badge {
    background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.3);
    border-radius: 8px; padding: 10px 14px; font-size: 13px; color: #86efac;
    margin-bottom: 24px;
  }
  h1 { font-size: 22px; font-weight: 600; margin-bottom: 6px; }
  .subtitle { color: var(--muted); font-size: 14px; margin-bottom: 28px; }
  .field { margin-bottom: 16px; }
  label { display: block; font-size: 13px; font-weight: 500; color: var(--muted); margin-bottom: 6px; }
  input {
    width: 100%; background: var(--bg); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); font-family: inherit;
    font-size: 14px; padding: 10px 14px; outline: none; transition: border-color .15s;
  }
  input:focus { border-color: var(--accent); }
  input[readonly] { opacity: 0.6; cursor: not-allowed; }
  .btn {
    width: 100%; padding: 11px;
    background: linear-gradient(135deg, var(--accent), #22c55e);
    border: none; border-radius: 8px; color: #fff;
    font-family: inherit; font-size: 14px; font-weight: 600;
    cursor: pointer; margin-top: 8px; transition: opacity .15s;
  }
  .btn:hover { opacity: 0.9; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .error {
    background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3);
    border-radius: 8px; color: #fca5a5; font-size: 13px;
    padding: 10px 14px; margin-bottom: 16px; display: none;
  }
  .error.show { display: block; }
  .hint { font-size: 12px; color: var(--muted); margin-top: 4px; }
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="card">
  <div class="logo">
    <div class="logo-icon">✉</div>
    <div>
      <div class="logo-text">DAT Mailer</div>
      <div class="logo-sub">Freight Outreach Automation</div>
    </div>
  </div>
  <div class="invite-badge">✓ You've been invited to join DAT Mailer</div>
  <h1>Create your account</h1>
  <p class="subtitle">Set up your credentials to get started</p>
  <div class="error" id="err"></div>
  <div class="field">
    <label>Email</label>
    <input type="email" id="email" value="{{ email }}" readonly>
  </div>
  <div class="field">
    <label>Your name</label>
    <input type="text" id="name" placeholder="John Smith">
  </div>
  <div class="field">
    <label>Password</label>
    <input type="password" id="password" placeholder="Min 6 characters">
    <div class="hint">At least 6 characters</div>
  </div>
  <div class="field">
    <label>Confirm password</label>
    <input type="password" id="password2" placeholder="Repeat password">
  </div>
  <button class="btn" id="regBtn" onclick="doRegister()">Create Account</button>
</div>

<script>
  const TOKEN      = "{{ token }}";
  const CSRF_TOKEN = "{{ csrf_token }}";

  async function doRegister() {
    const name = document.getElementById('name').value.trim();
    const password = document.getElementById('password').value;
    const password2 = document.getElementById('password2').value;
    const btn = document.getElementById('regBtn');

    if (!name) { showErr('Please enter your name'); return; }
    if (password.length < 6) { showErr('Password must be at least 6 characters'); return; }
    if (password !== password2) { showErr('Passwords do not match'); return; }

    btn.disabled = true; btn.textContent = 'Creating account…';
    try {
      const res = await fetch('/api/auth/register', {
        method: 'POST',
        headers: {'Content-Type': 'application/json', 'X-CSRF-Token': CSRF_TOKEN},
        body: JSON.stringify({ token: TOKEN, name, password })
      });
      const data = await res.json();
      if (res.ok) { window.location.href = '/'; }
      else { showErr(data.error || 'Registration failed'); btn.disabled = false; btn.textContent = 'Create Account'; }
    } catch(e) { showErr('Network error'); btn.disabled = false; btn.textContent = 'Create Account'; }
  }

  function showErr(msg) {
    const err = document.getElementById('err');
    err.textContent = msg; err.classList.add('show');
  }

  document.addEventListener('keydown', e => { if (e.key === 'Enter') doRegister(); });
</script>
</body>
</html>
